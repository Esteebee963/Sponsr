<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sponsr — Visa Sponsorship Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p950:#1e0a3c;--p800:#3b0764;--p700:#6b21a8;--p600:#7c3aed;--p500:#8b5cf6;--p400:#a78bfa;--p100:#ede9fe;--p50:#f5f3ff;
  --g500:#22c55e;--g100:#dcfce7;--g800:#166534;
  --r500:#ef4444;--r100:#fee2e2;--r800:#991b1b;
  --a100:#fef3c7;--a800:#92400e;
  --s950:#020617;--s900:#0f172a;--s800:#1e293b;--s700:#334155;--s600:#475569;--s500:#64748b;--s400:#94a3b8;--s300:#cbd5e1;--s200:#e2e8f0;--s100:#f1f5f9;--s50:#f8fafc;
  --white:#fff;
  --fd:'Sora',sans-serif;--fb:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--white);color:var(--s800);-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--fb);border:none}
input,select{font-family:var(--fb)}
a{text-decoration:none;color:inherit}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:999;height:64px;display:flex;align-items:center;padding:0 32px;transition:all .3s}
.nav.solid{background:rgba(255,255,255,.96);border-bottom:1px solid var(--s200);backdrop-filter:blur(16px);box-shadow:0 1px 12px rgba(0,0,0,.06)}
.nav-inner{max-width:1200px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo-icon{width:36px;height:36px;background:var(--p700);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo-text{font-family:var(--fd);font-weight:700;font-size:20px;color:var(--white);transition:color .3s}
.nav.solid .nav-logo-text{color:var(--s900)}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none}
.nav-links a,.nav-links button.nav-link{font-size:15px;font-weight:500;color:rgba(255,255,255,.85);padding:8px 16px;border-radius:8px;background:none;transition:all .2s;cursor:pointer;display:block}
.nav.solid .nav-links a,.nav.solid .nav-links button.nav-link{color:var(--s600)}
.nav-links a:hover,.nav-links button.nav-link:hover{color:var(--p600);background:var(--p50)}
.nav-links a.active{color:var(--p600);background:var(--p50)}
.btn-signin{background:var(--p700)!important;color:var(--white)!important;border-radius:10px!important;font-weight:600!important;padding:9px 22px!important;transition:all .2s!important}
.btn-signin:hover{background:var(--p800)!important;transform:translateY(-1px)}

/* HERO */
.hero{min-height:100vh;background:linear-gradient(140deg,#3b0764 0%,#6b21a8 45%,#7c3aed 100%);display:flex;flex-direction:column;justify-content:center;padding:120px 32px 100px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 40%,rgba(167,139,250,.2) 0%,transparent 55%),radial-gradient(ellipse at 15% 85%,rgba(59,7,100,.4) 0%,transparent 45%);pointer-events:none}
.hero-inner{max-width:1200px;margin:0 auto;width:100%;position:relative;z-index:1}
.eyebrow{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:7px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,.9);margin-bottom:28px;backdrop-filter:blur(8px)}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--g500);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.hero h1{font-family:var(--fd);font-size:clamp(44px,7vw,80px);font-weight:800;color:white;line-height:1.08;letter-spacing:-.03em;margin-bottom:24px;max-width:740px}
.hero-sub{font-size:clamp(16px,2vw,20px);color:rgba(255,255,255,.75);max-width:540px;margin-bottom:44px;line-height:1.6}
.search-bar{display:flex;align-items:center;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.28);border-radius:14px;padding:10px 10px 10px 20px;max-width:660px;backdrop-filter:blur(12px);transition:all .2s}
.search-bar:focus-within{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.16)}
.search-bar svg{color:rgba(255,255,255,.55);flex-shrink:0;margin-right:12px}
.search-bar input{flex:1;background:none;border:none;outline:none;font-size:16px;color:white}
.search-bar input::placeholder{color:rgba(255,255,255,.45)}
.btn-search{background:var(--p950);color:white;font-size:15px;font-weight:600;padding:14px 28px;border-radius:10px;display:flex;align-items:center;gap:8px;flex-shrink:0;transition:all .2s}
.btn-search:hover{background:#0f0520;transform:translateY(-1px)}
.popular{margin-top:20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.popular-label{font-size:13px;color:rgba(255,255,255,.55);font-weight:500}
.popular-tag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:100px;padding:5px 14px;font-size:13px;font-weight:600;color:rgba(255,255,255,.85);transition:background .2s}
.popular-tag:hover{background:rgba(255,255,255,.2)}

/* SECTION UTILITIES */
.section-tag{display:inline-block;background:var(--p100);color:var(--p700);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:16px}
.section-h2{font-family:var(--fd);font-size:clamp(28px,3.5vw,44px);font-weight:800;color:var(--s950);letter-spacing:-.03em;margin-bottom:12px}
.section-sub{font-size:18px;color:var(--s500);max-width:500px;margin:0 auto 52px}

/* PROBLEM */
.problem{padding:100px 32px;background:var(--s50)}
.problem-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.problem h2{font-family:var(--fd);font-size:clamp(30px,4vw,52px);font-weight:800;color:var(--s950);letter-spacing:-.03em;line-height:1.15;margin-bottom:32px}
.problem-point{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.problem-dot{width:8px;height:8px;border-radius:50%;background:var(--p600);flex-shrink:0;margin-top:8px}
.problem-point p{font-size:17px;color:var(--s600);line-height:1.5}
.problem-point strong{color:var(--s900);font-weight:700}
.excel-card{background:white;border:1px solid var(--s200);border-radius:20px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.excel-preview{background:var(--s100);border-radius:12px;padding:24px;margin-bottom:16px;text-align:center}
.excel-filename{font-family:'Courier New',monospace;font-size:12px;color:var(--s500);margin-bottom:16px;font-weight:600}
.excel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:0 auto 12px;max-width:220px}
.excel-cell{height:12px;border-radius:2px;background:var(--s300)}
.excel-cell.hdr{background:var(--s400)}
.excel-caption{font-size:13px;color:var(--s500);font-style:italic;text-align:center;line-height:1.6}

/* HOW */
.how{padding:100px 32px;background:white;text-align:center}
.how-inner{max-width:1200px;margin:0 auto}
.how-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;text-align:left}
.how-card{background:var(--s50);border:1px solid var(--s200);border-radius:20px;padding:36px 28px;transition:all .2s}
.how-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(107,33,168,.1)}
.how-icon{width:56px;height:56px;background:var(--p700);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;color:white}
.how-card h3{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--s900);margin-bottom:10px}
.how-card p{font-size:15px;color:var(--s500);line-height:1.6}

/* COMPANY CARDS */
.company-card{background:white;border:1px solid var(--s200);border-radius:20px;padding:20px;cursor:pointer;transition:all .2s}
.company-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.1);border-color:var(--p400)}
.card-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.card-avatar{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:18px;font-weight:700;color:white;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:16px;font-weight:700;color:var(--s900);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-loc{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--s500)}
.badge-active{background:var(--g100);color:var(--g800);font-size:12px;font-weight:700;padding:4px 12px;border-radius:100px;flex-shrink:0}
.badge-suspended{background:var(--r100);color:var(--r800);font-size:12px;font-weight:700;padding:4px 12px;border-radius:100px;flex-shrink:0}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tag{background:var(--s100);border-radius:100px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--s600)}
.tag-green{background:var(--g100)!important;color:var(--g800)!important}
.tag-amber{background:var(--a100)!important;color:var(--a800)!important}
.tag-red{background:var(--r100)!important;color:var(--r800)!important}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--s100)}
.card-rating{font-size:13px;color:var(--s500)}
.card-rating strong{color:var(--s800)}
.card-cta{font-size:13px;font-weight:600;color:var(--p600)}

/* FEATURED SECTION */
.featured{padding:100px 32px;background:var(--s50)}
.featured-inner{max-width:1200px;margin:0 auto}
.featured-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;flex-wrap:wrap;gap:16px}
.btn-browse{background:none;border:1.5px solid var(--p600);color:var(--p600);font-size:14px;font-weight:700;padding:10px 22px;border-radius:10px;transition:all .2s}
.btn-browse:hover{background:var(--p600);color:white}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}

/* CTA */
.cta{padding:100px 32px;background:linear-gradient(135deg,var(--p700) 0%,var(--p600) 100%);text-align:center;position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(167,139,250,.2) 0%,transparent 65%)}
.cta-inner{max-width:620px;margin:0 auto;position:relative;z-index:1}
.cta h2{font-family:var(--fd);font-size:clamp(28px,4vw,48px);font-weight:800;color:white;letter-spacing:-.03em;margin-bottom:14px}
.cta p{font-size:18px;color:rgba(255,255,255,.72);margin-bottom:44px}
.cta-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-white{background:white;color:var(--p700);font-size:15px;font-weight:700;padding:16px 32px;border-radius:12px;display:flex;align-items:center;gap:10px;transition:all .2s}
.btn-white:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.btn-outline-white{background:rgba(255,255,255,.12);color:white;border:1.5px solid rgba(255,255,255,.32);font-size:15px;font-weight:600;padding:16px 32px;border-radius:12px;display:flex;align-items:center;gap:10px;transition:all .2s}
.btn-outline-white:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}

/* FOOTER */
footer{background:var(--s950);padding:64px 32px 32px}
.footer-inner{max-width:1200px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:48px;padding-bottom:48px;border-bottom:1px solid var(--s800);margin-bottom:28px}
.footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer}
.footer-logo-icon{width:30px;height:30px;background:var(--p700);border-radius:8px;display:flex;align-items:center;justify-content:center}
.footer-logo-text{font-family:var(--fd);font-size:18px;font-weight:700;color:white}
.footer-desc{font-size:14px;color:var(--s500);line-height:1.7;margin-bottom:8px}
.footer-data{font-size:12px;color:var(--s700)}
.footer-col h4{font-family:var(--fd);font-size:13px;font-weight:700;color:white;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px}
.footer-col ul{list-style:none}
.footer-col li{margin-bottom:10px}
.footer-col a,.footer-col button.footer-link{font-size:14px;color:var(--s500);background:none;transition:color .2s;cursor:pointer;display:block;text-align:left}
.footer-col a:hover,.footer-col button.footer-link:hover{color:var(--s300)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--s700)}

/* SEARCH PAGE */
.page-wrap{padding-top:64px;min-height:100vh}
.search-header{background:linear-gradient(140deg,#3b0764 0%,#6b21a8 60%,#7c3aed 100%);padding:60px 32px 48px}
.search-header-inner{max-width:1200px;margin:0 auto}
.search-header h1{font-family:var(--fd);font-size:clamp(28px,4vw,44px);font-weight:800;color:white;margin-bottom:8px;letter-spacing:-.03em}
.search-header p{color:rgba(255,255,255,.7);font-size:16px;margin-bottom:32px}
.search-input-row{display:flex;gap:12px;flex-wrap:wrap}
.search-input-box{flex:1;min-width:260px;display:flex;align-items:center;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.28);border-radius:12px;padding:12px 16px;backdrop-filter:blur(8px);transition:all .2s}
.search-input-box:focus-within{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.18)}
.search-input-box svg{color:rgba(255,255,255,.55);flex-shrink:0;margin-right:10px}
.search-input-box input{flex:1;background:none;border:none;outline:none;font-size:15px;color:white}
.search-input-box input::placeholder{color:rgba(255,255,255,.45)}
.btn-filter{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.28);color:white;font-size:14px;font-weight:600;padding:12px 20px;border-radius:12px;display:flex;align-items:center;gap:8px;transition:all .2s;backdrop-filter:blur(8px)}
.btn-filter:hover,.btn-filter.active{background:rgba(255,255,255,.22)}
.filter-badge{background:var(--p500);color:white;font-size:11px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.filters-panel{background:white;border-bottom:1px solid var(--s200);padding:20px 32px}
.filters-inner{max-width:1200px;margin:0 auto;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:6px;min-width:160px}
.filter-group label{font-size:12px;font-weight:600;color:var(--s500);text-transform:uppercase;letter-spacing:.06em}
.filter-group select{border:1px solid var(--s200);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--s800);background:white;outline:none;transition:border-color .2s}
.filter-group select:focus{border-color:var(--p500)}
.btn-clear-filters{background:none;border:1px solid var(--s200);color:var(--s600);font-size:13px;font-weight:600;padding:9px 16px;border-radius:8px;transition:all .2s;align-self:flex-end}
.btn-clear-filters:hover{border-color:var(--r500);color:var(--r500)}
.results-body{padding:40px 32px;background:var(--s50);min-height:400px}
.results-inner{max-width:1200px;margin:0 auto}
.results-count{font-size:15px;color:var(--s600);margin-bottom:28px}
.results-count strong{color:var(--s900);font-weight:700}
.results-count em{color:var(--p700);font-style:normal;font-weight:600}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.empty-state{text-align:center;padding:80px 32px}
.empty-state svg{margin:0 auto 20px;display:block}
.empty-state h3{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--s700);margin-bottom:8px}
.empty-state p{font-size:15px;color:var(--s500);margin-bottom:24px}
.btn-clear{background:var(--p700);color:white;font-size:14px;font-weight:600;padding:12px 24px;border-radius:10px;transition:all .2s}
.btn-clear:hover{background:var(--p800)}

/* COMPANY PROFILE */
.profile-hero{background:linear-gradient(140deg,#3b0764,#6b21a8);padding:80px 32px 60px}
.profile-hero-inner{max-width:1000px;margin:0 auto}
.back-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.7);font-size:14px;font-weight:500;margin-bottom:32px;background:none;border:none;transition:color .2s;cursor:pointer}
.back-btn:hover{color:white}
.profile-top{display:flex;align-items:flex-start;gap:24px}
.profile-avatar{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:28px;font-weight:700;color:white;flex-shrink:0}
.profile-name{font-family:var(--fd);font-size:clamp(28px,4vw,40px);font-weight:800;color:white;margin-bottom:8px;letter-spacing:-.02em}
.profile-loc{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:15px;margin-bottom:16px}
.profile-badges{display:flex;gap:10px;flex-wrap:wrap}
.profile-body{max-width:1000px;margin:0 auto;padding:40px 32px}
.profile-grid{display:grid;grid-template-columns:2fr 1fr;gap:32px}
.profile-section{background:white;border:1px solid var(--s200);border-radius:20px;padding:28px;margin-bottom:24px}
.profile-section h3{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--s900);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--s100)}
.profile-section p{font-size:15px;color:var(--s600);line-height:1.7}
.stat-row{display:flex;flex-direction:column;gap:12px}
.stat-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--s100)}
.stat-item:last-child{border-bottom:none}
.stat-label{font-size:13px;color:var(--s500);font-weight:500}
.stat-value{font-size:14px;font-weight:700;color:var(--s900)}
.cos-indicator{padding:16px;border-radius:12px;margin-bottom:16px}
.cos-high{background:var(--g100)}
.cos-med{background:var(--a100)}
.cos-low{background:var(--r100)}
.cos-title{font-size:14px;font-weight:700;margin-bottom:4px}
.cos-high .cos-title{color:var(--g800)}
.cos-med .cos-title{color:var(--a800)}
.cos-low .cos-title{color:var(--r800)}
.cos-sub{font-size:13px}
.cos-high .cos-sub{color:#166534aa}
.cos-med .cos-sub{color:#92400eaa}
.cos-low .cos-sub{color:#991b1baa}
.btn-save{width:100%;background:var(--p700);color:white;font-size:15px;font-weight:600;padding:14px;border-radius:12px;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-save:hover{background:var(--p800);transform:translateY(-1px)}
.btn-save.saved{background:var(--g500)}

/* ALERTS */
.alerts-wrap{padding-top:64px;min-height:100vh;background:var(--s50)}
.alerts-header{background:linear-gradient(140deg,#3b0764,#6b21a8);padding:60px 32px}
.alerts-header-inner{max-width:800px;margin:0 auto}
.alerts-header h1{font-family:var(--fd);font-size:clamp(28px,4vw,44px);font-weight:800;color:white;margin-bottom:8px;letter-spacing:-.03em}
.alerts-header p{color:rgba(255,255,255,.7);font-size:16px}
.alerts-body{max-width:800px;margin:0 auto;padding:40px 32px}
.alert-card{background:white;border:1px solid var(--s200);border-radius:16px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:all .2s}
.alert-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.alert-info h4{font-size:16px;font-weight:700;color:var(--s900);margin-bottom:4px}
.alert-info p{font-size:13px;color:var(--s500)}
.alert-actions{display:flex;gap:8px;flex-shrink:0}
.btn-pause{background:var(--s100);color:var(--s600);font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;transition:all .2s}
.btn-pause:hover{background:var(--s200)}
.btn-delete{background:var(--r100);color:var(--r800);font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;transition:all .2s}
.btn-delete:hover{background:var(--r500);color:white}
.create-alert-card{background:white;border:2px dashed var(--s200);border-radius:16px;padding:32px;text-align:center}
.create-alert-card h3{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--s800);margin-bottom:8px}
.create-alert-card p{font-size:15px;color:var(--s500);margin-bottom:24px}
.alert-form{display:flex;flex-direction:column;gap:16px;text-align:left;max-width:500px;margin:0 auto}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;font-weight:600;color:var(--s700);text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select{border:1px solid var(--s200);border-radius:10px;padding:11px 14px;font-size:15px;color:var(--s800);outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--p500)}
.btn-create-alert{background:var(--p700);color:white;font-size:15px;font-weight:700;padding:14px;border-radius:12px;width:100%;transition:all .2s}
.btn-create-alert:hover{background:var(--p800);transform:translateY(-1px)}

/* SIGN IN */
.signin-wrap{padding-top:64px;min-height:100vh;background:linear-gradient(140deg,#3b0764,#6b21a8);display:flex;align-items:center;justify-content:center;padding:80px 16px}
.signin-card{background:white;border-radius:24px;padding:48px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,.25)}
.signin-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.signin-logo-icon{width:40px;height:40px;background:var(--p700);border-radius:12px;display:flex;align-items:center;justify-content:center}
.signin-logo-text{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--s900)}
.signin-card h2{font-family:var(--fd);font-size:26px;font-weight:800;color:var(--s900);text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.signin-card .sub{font-size:15px;color:var(--s500);text-align:center;margin-bottom:32px}
.btn-google{width:100%;background:white;border:1.5px solid var(--s200);color:var(--s800);font-size:15px;font-weight:600;padding:13px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;transition:all .2s}
.btn-google:hover{border-color:var(--s400);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;color:var(--s400);font-size:13px;font-weight:500}
.divider::before,.divider::after{content:'';flex:1;border-top:1px solid var(--s200)}
.signin-form{display:flex;flex-direction:column;gap:16px}
.btn-signin-submit{width:100%;background:var(--p700);color:white;font-size:15px;font-weight:700;padding:14px;border-radius:12px;transition:all .2s;margin-top:4px}
.btn-signin-submit:hover{background:var(--p800);transform:translateY(-1px)}
.signin-footer{text-align:center;margin-top:20px;font-size:14px;color:var(--s500)}
.signin-footer button{background:none;color:var(--p600);font-weight:600;font-size:14px;transition:color .2s}
.signin-footer button:hover{color:var(--p700)}
.toast{position:fixed;bottom:28px;right:28px;background:var(--s900);color:white;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:900px){
  .problem-inner,.cards-grid,.results-grid,.how-cards,.profile-grid{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .nav{padding:0 16px}
  .hero,.problem,.how,.featured,.cta,footer{padding-left:16px;padding-right:16px}
  .search-bar{flex-direction:column;gap:10px;padding:16px}
  .btn-search{width:100%;justify-content:center}
  .profile-body,.alerts-body,.search-header,.results-body{padding-left:16px;padding-right:16px}
  .profile-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr}
  .footer-bottom{flex-direction:column;gap:8px;text-align:center}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── DATA ──────────────────────────────────────────────────────
const COMPANIES = [
  { id:1,  name:'Revolut',        location:'London, UK',    industry:'Fintech',       size:'5,000+', status:'Active',    rating:'A', cos:'high',   founded:2015, desc:'Global fintech company offering banking, crypto, and FX services. One of the UK\'s most active visa sponsors in the tech sector.' },
  { id:2,  name:'DeepMind',       location:'London, UK',    industry:'AI / Tech',     size:'1,000+', status:'Active',    rating:'A', cos:'high',   founded:2010, desc:'Leading AI research lab owned by Alphabet. Regularly sponsors researchers, engineers, and scientists worldwide.' },
  { id:3,  name:'Monzo',          location:'London, UK',    industry:'Fintech',       size:'2,000+', status:'Active',    rating:'A', cos:'medium', founded:2015, desc:'UK-based digital bank known for transparent banking. Active sponsor particularly in engineering and product roles.' },
  { id:4,  name:'NHS England',    location:'London, UK',    industry:'Healthcare',    size:'5,000+', status:'Active',    rating:'A', cos:'high',   founded:1948, desc:'The National Health Service is one of the largest employers in the UK and sponsors thousands of healthcare professionals annually.' },
  { id:5,  name:'Wise',           location:'London, UK',    industry:'Fintech',       size:'3,000+', status:'Active',    rating:'A', cos:'high',   founded:2011, desc:'International money transfer service with global engineering and product teams. Strong track record of sponsoring international talent.' },
  { id:6,  name:'Deliveroo',      location:'London, UK',    industry:'Tech',          size:'2,000+', status:'Active',    rating:'A', cos:'medium', founded:2013, desc:'Food delivery platform. Sponsors across engineering, data, and product roles.' },
  { id:7,  name:'HSBC',           location:'London, UK',    industry:'Banking',       size:'5,000+', status:'Active',    rating:'A', cos:'high',   founded:1865, desc:'One of the world\'s largest banking organisations. Extensive sponsorship programme across all functions.' },
  { id:8,  name:'Arm Holdings',   location:'Cambridge, UK', industry:'Semiconductors',size:'5,000+', status:'Active',    rating:'A', cos:'high',   founded:1990, desc:'Global semiconductor design company. One of the UK\'s largest tech employers and active international sponsors.' },
  { id:9,  name:'Checkout.com',   location:'London, UK',    industry:'Fintech',       size:'2,000+', status:'Active',    rating:'A', cos:'high',   founded:2012, desc:'Global payment solutions company. Actively sponsors across engineering, product, and commercial roles.' },
  { id:10, name:'Starling Bank',  location:'London, UK',    industry:'Fintech',       size:'1,000+', status:'Active',    rating:'A', cos:'medium', founded:2014, desc:'Award-winning digital bank with an engineering-heavy culture and active international hiring.' },
  { id:11, name:'Babylon Health', location:'London, UK',    industry:'Healthtech',    size:'500+',   status:'Suspended', rating:'B', cos:'low',    founded:2013, desc:'Digital health company. Note: licence currently suspended — verify status before applying.' },
  { id:12, name:'Ocado',          location:'Hatfield, UK',  industry:'Tech / Retail', size:'1,000+', status:'Active',    rating:'A', cos:'medium', founded:2000, desc:'Online grocery and tech company. Major sponsor in engineering and robotics roles.' },
];
const INDUSTRIES = ['All','Fintech','AI / Tech','Tech','Healthcare','Healthtech','Banking','Tech / Retail','Semiconductors'];
const LOCATIONS   = ['All','London, UK','Cambridge, UK','Hatfield, UK','Manchester, UK'];
const ROLES       = ['All','Software Engineer','Product Manager','Data Scientist','Designer','DevOps Engineer','Healthcare Professional','Finance Analyst'];
const AVATAR_COLORS = ['#6b21a8','#1d4ed8','#059669','#dc2626','#d97706','#0891b2','#7c3aed','#be185d','#b45309','#0f766e'];

// ── HELPERS ───────────────────────────────────────────────────
const color = id => AVATAR_COLORS[id % AVATAR_COLORS.length];
const cosLabel = c => c.cos==='high' ? 'Active CoS' : c.cos==='medium' ? 'Moderate CoS' : 'Low CoS';
const cosClass = c => c.cos==='high' ? 'tag tag-green' : c.cos==='medium' ? 'tag tag-amber' : 'tag tag-red';

// ── ICONS ─────────────────────────────────────────────────────
const IconSearch = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const IconArrow  = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
const IconBack   = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
const IconPin    = ({size=12}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
const IconFilter = ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>;
const IconBell   = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
const IconSave   = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>;
const IconLogo   = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>;
const IconGoogle = () => <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.8 13.3l7.9 6.1C12.5 13.3 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.4-4.1 7-10.1 7-17.6z"/><path fill="#FBBC05" d="M10.7 28.6A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6L2.3 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l8.2-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2 1.4-4.7 2.2-7.6 2.2-6.2 0-11.5-3.8-13.3-9.2l-8.1 6.2C6.6 42.6 14.6 48 24 48z"/></svg>;

// ── COMPANY CARD ──────────────────────────────────────────────
function CompanyCard({ company, onNavigate }) {
  return (
    <div className="company-card" onClick={() => onNavigate('profile', company.id)} role="button" tabIndex={0}
      onKeyDown={e => e.key==='Enter' && onNavigate('profile', company.id)}>
      <div className="card-top">
        <div className="card-avatar" style={{background: color(company.id)}}>{company.name[0]}</div>
        <div className="card-info">
          <div className="card-name">{company.name}</div>
          <div className="card-loc"><IconPin />{company.location}</div>
        </div>
        <span className={company.status==='Active' ? 'badge-active' : 'badge-suspended'}>{company.status}</span>
      </div>
      <div className="card-tags">
        <span className="tag">{company.industry}</span>
        <span className="tag">{company.size} employees</span>
        <span className={cosClass(company)}>{cosLabel(company)}</span>
      </div>
      <div className="card-footer">
        <span className="card-rating">Licence Rating: <strong>{company.rating}</strong></span>
        <span className="card-cta">View profile →</span>
      </div>
    </div>
  );
}

// ── NAVBAR ────────────────────────────────────────────────────
function Navbar({ page, onNavigate }) {
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const isHome = page === 'home';
  return (
    <nav className={`nav ${scrolled || !isHome ? 'solid' : ''}`}>
      <div className="nav-inner">
        <div className="nav-logo" onClick={() => onNavigate('home')}>
          <div className="nav-logo-icon"><IconLogo /></div>
          <span className="nav-logo-text">Sponsr</span>
        </div>
        <ul className="nav-links" style={open ? {display:'flex',flexDirection:'column',position:'absolute',top:64,left:0,right:0,background:'white',padding:'12px 16px 20px',borderBottom:'1px solid var(--s200)',boxShadow:'0 8px 24px rgba(0,0,0,.08)',gap:4} : {}}>
          <li><button className={`nav-link ${page==='search'?'active':''}`} onClick={() => { onNavigate('search'); setOpen(false); }}>Search</button></li>
          <li><button className={`nav-link ${page==='alerts'?'active':''}`} onClick={() => { onNavigate('alerts'); setOpen(false); }}>Alerts</button></li>
          <li><button className="btn-signin" onClick={() => { onNavigate('signin'); setOpen(false); }}>Sign In</button></li>
        </ul>
        <button style={{display:'none',background:'none',border:'none',color:scrolled||!isHome?'var(--s800)':'white',padding:4}} className="hamburger" onClick={() => setOpen(!open)}>
          {open
            ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            : <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          }
        </button>
      </div>
    </nav>
  );
}

// ── LANDING ───────────────────────────────────────────────────
function Landing({ onNavigate }) {
  const [q, setQ] = useState('');
  const featured = COMPANIES.filter(c => c.status==='Active').slice(0,3);
  const go = e => { e.preventDefault(); onNavigate('search', null, q); };
  return (
    <main>
      <section className="hero">
        <div className="hero-inner">
          <div className="eyebrow"><span className="pulse"></span>120,000+ verified sponsors — updated weekly</div>
          <h1>Find UK companies<br/>that sponsor visas</h1>
          <p className="hero-sub">Stop wasting hours digging through GOV.UK spreadsheets.<br/>Search 120,000+ licensed sponsors instantly.</p>
          <form className="search-bar" onSubmit={go}>
            <IconSearch />
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by company name, industry, or location..." />
            <button type="submit" className="btn-search">Search <IconArrow /></button>
          </form>
          <div className="popular">
            <span className="popular-label">Popular searches:</span>
            {['Software Engineer','Fintech','London','NHS','Product Manager'].map(t=>(
              <button key={t} className="popular-tag" onClick={() => onNavigate('search', null, t)}>{t}</button>
            ))}
          </div>
        </div>
      </section>

      <section className="problem">
        <div className="problem-inner">
          <div>
            <h2>The GOV.UK register<br/>is a nightmare</h2>
            {[['120,000+ rows','in a raw Excel file'],['No search function','beyond Ctrl+F'],['Outdated information','mixed with active sponsors'],['Zero UX','for international job seekers'],['No role filtering','— you search completely blind']].map(([b,r])=>(
              <div key={b} className="problem-point"><div className="problem-dot"></div><p><strong>{b}</strong> {r}</p></div>
            ))}
          </div>
          <div className="excel-card">
            <div className="excel-preview">
              <div className="excel-filename">[GOV.UK Excel File]</div>
              <div className="excel-grid">{Array(36).fill(0).map((_,i)=><div key={i} className={`excel-cell${i<4?' hdr':''}`}/>)}</div>
              <p style={{fontSize:12,color:'var(--s400)',marginTop:12}}>120,000+ unorganised rows</p>
            </div>
            <p className="excel-caption">Hours of manual searching for a simple question:<br/><em>"Does this company sponsor?"</em></p>
          </div>
        </div>
      </section>

      <section className="how">
        <div className="how-inner">
          <span className="section-tag">How it works</span>
          <h2 className="section-h2">How Sponsr works</h2>
          <p className="section-sub">We transform government data into intelligent, searchable information</p>
          <div className="how-cards">
            {[
              {icon:<IconSearch size={26}/>, title:'Search instantly', body:'Type a company name, industry, or location. Get results in milliseconds, not hours.'},
              {icon:<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>, title:'Verify sponsors', body:'See active licence status, CoS activity, and sponsorship history. Know before you apply.'},
              {icon:<IconBell size={26}/>, title:'Get alerts', body:'Set up custom alerts for new sponsors in your industry or preferred location.'},
            ].map(({icon,title,body})=>(
              <div key={title} className="how-card"><div className="how-icon">{icon}</div><h3>{title}</h3><p>{body}</p></div>
            ))}
          </div>
        </div>
      </section>

      <section className="featured">
        <div className="featured-inner">
          <div className="featured-head">
            <div><span className="section-tag">Featured sponsors</span><h2 className="section-h2" style={{marginTop:8}}>Active sponsors hiring now</h2></div>
            <button className="btn-browse" onClick={() => onNavigate('search')}>Browse all companies →</button>
          </div>
          <div className="cards-grid">{featured.map(c=><CompanyCard key={c.id} company={c} onNavigate={onNavigate}/>)}</div>
        </div>
      </section>

      <section className="cta">
        <div className="cta-inner">
          <h2>Start your UK job search today</h2>
          <p>Join thousands of international professionals finding visa-sponsored opportunities</p>
          <div className="cta-btns">
            <button className="btn-white" onClick={() => onNavigate('search')}><IconSearch size={18}/>Start Searching</button>
            <button className="btn-outline-white" onClick={() => onNavigate('alerts')}><IconBell size={18}/>Set Up Alerts</button>
          </div>
        </div>
      </section>
    </main>
  );
}

// ── SEARCH ────────────────────────────────────────────────────
function Search({ onNavigate, initialQ='' }) {
  const [q, setQ] = useState(initialQ);
  const [industry, setIndustry] = useState('All');
  const [location, setLocation] = useState('All');
  const [role, setRole] = useState('All');
  const [status, setStatus] = useState('All');
  const [filtersOpen, setFiltersOpen] = useState(false);
  const activeFilters = [industry,location,role,status].filter(v=>v!=='All').length;
  const filtered = COMPANIES.filter(c => {
    const lq = q.toLowerCase();
    const mq = !lq || c.name.toLowerCase().includes(lq) || c.industry.toLowerCase().includes(lq) || c.location.toLowerCase().includes(lq);
    return mq && (industry==='All'||c.industry===industry) && (location==='All'||c.location===location) && (status==='All'||c.status===status);
  });
  const clearAll = () => { setQ(''); setIndustry('All'); setLocation('All'); setRole('All'); setStatus('All'); };
  return (
    <div className="page-wrap">
      <div className="search-header">
        <div className="search-header-inner">
          <h1>Search Sponsors</h1>
          <p>Find verified UK companies that sponsor Skilled Worker visas</p>
          <div className="search-input-row">
            <div className="search-input-box">
              <IconSearch />
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Company name, industry, or location..." />
              {q && <button style={{background:'none',color:'rgba(255,255,255,.6)',fontSize:16,marginLeft:8}} onClick={()=>setQ('')}>✕</button>}
            </div>
            <button className={`btn-filter ${filtersOpen?'active':''}`} onClick={()=>setFiltersOpen(!filtersOpen)}>
              <IconFilter /> Filters {activeFilters>0 && <span className="filter-badge">{activeFilters}</span>}
            </button>
          </div>
        </div>
      </div>
      {filtersOpen && (
        <div className="filters-panel">
          <div className="filters-inner">
            {[['Industry',industry,setIndustry,INDUSTRIES],['Location',location,setLocation,LOCATIONS],['Job Role',role,setRole,ROLES],['Status',status,setStatus,['All','Active','Suspended']]].map(([label,val,set,opts])=>(
              <div key={label} className="filter-group">
                <label>{label}</label>
                <select value={val} onChange={e=>set(e.target.value)}>{opts.map(o=><option key={o}>{o}</option>)}</select>
              </div>
            ))}
            {activeFilters>0 && <button className="btn-clear-filters" onClick={()=>{setIndustry('All');setLocation('All');setRole('All');setStatus('All');}}>Clear filters</button>}
          </div>
        </div>
      )}
      <div className="results-body">
        <div className="results-inner">
          <p className="results-count">
            <strong>{filtered.length}</strong> sponsor{filtered.length!==1?'s':''} found
            {q && <> for <em>"{q}"</em></>}
          </p>
          {filtered.length > 0
            ? <div className="results-grid">{filtered.map(c=><CompanyCard key={c.id} company={c} onNavigate={onNavigate}/>)}</div>
            : <div className="empty-state">
                <IconSearch size={48}/>
                <h3>No sponsors found</h3>
                <p>Try adjusting your search or clearing filters</p>
                <button className="btn-clear" onClick={clearAll}>Clear search</button>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

// ── COMPANY PROFILE ───────────────────────────────────────────
function CompanyProfile({ companyId, onNavigate }) {
  const company = COMPANIES.find(c=>c.id===companyId) || COMPANIES[0];
  const [saved, setSaved] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 2500); };
  const handleSave = () => { setSaved(!saved); showToast(saved ? 'Removed from saved' : '✓ Company saved'); };
  const related = COMPANIES.filter(c=>c.industry===company.industry && c.id!==company.id).slice(0,3);
  return (
    <div className="page-wrap">
      <div className="profile-hero">
        <div className="profile-hero-inner">
          <button className="back-btn" onClick={()=>onNavigate('search')}><IconBack /> Back to search</button>
          <div className="profile-top">
            <div className="profile-avatar" style={{background:color(company.id)}}>{company.name[0]}</div>
            <div>
              <h1 className="profile-name">{company.name}</h1>
              <div className="profile-loc"><IconPin size={14}/>{company.location}</div>
              <div className="profile-badges">
                <span className={company.status==='Active'?'badge-active':'badge-suspended'}>{company.status}</span>
                <span className="tag" style={{background:'rgba(255,255,255,.2)',color:'rgba(255,255,255,.9)',border:'1px solid rgba(255,255,255,.2)'}}>{company.industry}</span>
                <span className="tag" style={{background:'rgba(255,255,255,.2)',color:'rgba(255,255,255,.9)',border:'1px solid rgba(255,255,255,.2)'}}>Licence {company.rating}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div className="profile-body">
        <div className="profile-grid">
          <div>
            <div className="profile-section">
              <h3>About {company.name}</h3>
              <p>{company.desc}</p>
            </div>
            <div className="profile-section">
              <h3>CoS Activity Indicator</h3>
              <div className={`cos-indicator ${company.cos==='high'?'cos-high':company.cos==='medium'?'cos-med':'cos-low'}`}>
                <div className="cos-title">{company.cos==='high'?'Active — recent sponsorship activity':company.cos==='medium'?'Moderate — some recent CoS data':'Low activity — limited recent CoS data'}</div>
                <div className="cos-sub">Indicative only — based on historical register patterns. Not a guarantee of current availability.</div>
              </div>
              <p style={{fontSize:13,color:'var(--s500)',lineHeight:1.6}}>This indicator is based on patterns in the GOV.UK sponsor register. A company with high CoS activity has consistently issued certificates of sponsorship in recent periods.</p>
            </div>
            {related.length > 0 && (
              <div className="profile-section">
                <h3>Similar sponsors in {company.industry}</h3>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {related.map(c=>(
                    <div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--s100)',cursor:'pointer'}} onClick={()=>onNavigate('profile',c.id)}>
                      <div style={{width:36,height:36,borderRadius:10,background:color(c.id),display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontFamily:'var(--fd)',fontWeight:700,fontSize:14,flexShrink:0}}>{c.name[0]}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:15,fontWeight:700,color:'var(--s900)'}}>{c.name}</div>
                        <div style={{fontSize:13,color:'var(--s500)'}}>{c.location}</div>
                      </div>
                      <span className={c.status==='Active'?'badge-active':'badge-suspended'}>{c.status}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          <div>
            <div className="profile-section">
              <h3>Company Details</h3>
              <div className="stat-row">
                {[['Status',<span className={company.status==='Active'?'badge-active':'badge-suspended'} style={{fontSize:12}}>{company.status}</span>],
                  ['Licence Rating',company.rating],['Industry',company.industry],['Location',company.location],
                  ['Company Size',company.size+' employees'],['Founded',company.founded],
                ].map(([l,v])=>(
                  <div key={l} className="stat-item"><span className="stat-label">{l}</span><span className="stat-value">{v}</span></div>
                ))}
              </div>
              <button className={`btn-save ${saved?'saved':''}`} onClick={handleSave}>
                <IconSave /> {saved ? 'Saved ✓' : 'Save Company'}
              </button>
            </div>
            <div className="profile-section">
              <h3>Set an Alert</h3>
              <p style={{fontSize:14,color:'var(--s500)',marginBottom:16,lineHeight:1.6}}>Get notified when {company.name} posts new sponsored roles matching your criteria.</p>
              <button className="btn-save" onClick={()=>onNavigate('alerts')}><IconBell /> Create Alert for {company.name}</button>
            </div>
          </div>
        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ── ALERTS ────────────────────────────────────────────────────
function Alerts({ onNavigate }) {
  const [alerts, setAlerts] = useState([
    { id:1, title:'Software Engineer — Fintech', filters:'London · Fintech · Active only' },
    { id:2, title:'Product Manager — Tech',      filters:'London · Any location · Active only' },
  ]);
  const [form, setForm] = useState({ role:'', industry:'All', location:'All' });
  const [toast, setToast] = useState(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };
  const deleteAlert = id => { setAlerts(a=>a.filter(x=>x.id!==id)); showToast('Alert deleted'); };
  const createAlert = e => {
    e.preventDefault();
    if (!form.role.trim()) { showToast('Please enter a job role'); return; }
    const newAlert = { id: Date.now(), title:`${form.role} — ${form.industry==='All'?'All industries':form.industry}`, filters:`${form.location==='All'?'All locations':form.location} · Active only` };
    setAlerts(a=>[...a, newAlert]);
    setForm({ role:'', industry:'All', location:'All' });
    showToast('✓ Alert created successfully');
  };
  return (
    <div className="alerts-wrap">
      <div className="alerts-header">
        <div className="alerts-header-inner">
          <h1>Job Alerts</h1>
          <p>Get notified when new sponsoring companies match your criteria</p>
        </div>
      </div>
      <div className="alerts-body">
        {alerts.length > 0 && (
          <div style={{marginBottom:32}}>
            <h3 style={{fontFamily:'var(--fd)',fontSize:18,fontWeight:700,color:'var(--s900)',marginBottom:16}}>Your alerts ({alerts.length})</h3>
            {alerts.map(a=>(
              <div key={a.id} className="alert-card">
                <div className="alert-info">
                  <h4>{a.title}</h4>
                  <p>{a.filters}</p>
                </div>
                <div className="alert-actions">
                  <button className="btn-pause">Pause</button>
                  <button className="btn-delete" onClick={()=>deleteAlert(a.id)}>Delete</button>
                </div>
              </div>
            ))}
          </div>
        )}
        <div className="create-alert-card">
          <h3>Create a new alert</h3>
          <p>We'll email you when new sponsors matching your filters are added</p>
          <form className="alert-form" onSubmit={createAlert}>
            <div className="form-group">
              <label>Job Role *</label>
              <input value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} placeholder="e.g. Software Engineer, Product Manager..." />
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Industry</label>
                <select value={form.industry} onChange={e=>setForm(f=>({...f,industry:e.target.value}))}>
                  {INDUSTRIES.map(i=><option key={i}>{i}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Location</label>
                <select value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))}>
                  {LOCATIONS.map(l=><option key={l}>{l}</option>)}
                </select>
              </div>
            </div>
            <button type="submit" className="btn-create-alert"><IconBell /> Create Alert</button>
          </form>
        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ── SIGN IN ───────────────────────────────────────────────────
function SignIn({ onNavigate }) {
  const [mode, setMode] = useState('signin');
  const [form, setForm] = useState({ email:'', password:'' });
  const [toast, setToast] = useState(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };
  const handle = e => {
    e.preventDefault();
    if (!form.email || !form.password) { showToast('Please fill in all fields'); return; }
    showToast(mode==='signin' ? '✓ Signed in successfully' : '✓ Account created');
    setTimeout(() => onNavigate('home'), 1000);
  };
  return (
    <div className="signin-wrap">
      <div className="signin-card">
        <div className="signin-logo">
          <div className="signin-logo-icon"><IconLogo /></div>
          <span className="signin-logo-text">Sponsr</span>
        </div>
        <h2>{mode==='signin' ? 'Welcome back' : 'Create your account'}</h2>
        <p className="sub">{mode==='signin' ? 'Sign in to access your saved companies and alerts' : 'Join thousands of international professionals'}</p>
        <button className="btn-google"><IconGoogle /> Continue with Google</button>
        <div className="divider">or</div>
        <form className="signin-form" onSubmit={handle}>
          <div className="form-group">
            <label>Email address</label>
            <input type="email" placeholder="you@example.com" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} />
          </div>
          <div className="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} />
          </div>
          <button type="submit" className="btn-signin-submit">{mode==='signin' ? 'Sign In' : 'Create Account'}</button>
        </form>
        <div className="signin-footer">
          {mode==='signin' ? <>Don't have an account? <button onClick={()=>setMode('signup')}>Sign up free</button></> : <>Already have an account? <button onClick={()=>setMode('signin')}>Sign in</button></>}
        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ── FOOTER ────────────────────────────────────────────────────

  return (
    <footer>
      <div className="footer-inner">
        <div className="footer-grid">
          <div>
            <div className="footer-logo" onClick={()=>onNavigate('home')}>
              <div className="footer-logo-icon"><IconLogo /></div>
              <span className="footer-logo-text">Sponsr</span>
            </div>
            <p className="footer-desc">Visa sponsorship intelligence for international professionals in the UK.</p>
            <p className="footer-data">Data sourced from GOV.UK Register of Licensed Sponsors</p>
          </div>
          <div className="footer-col">
            <h4>Product</h4>
            <ul>
              <li><button className="footer-link" onClick={()=>onNavigate('search')}>Search</button></li>
              <li><button className="footer-link" onClick={()=>onNavigate('alerts')}>Alerts</button></li>
            </ul>
          </div>
          <div className="footer-col">
            <h4>Company</h4>
            <ul><li><a href="#">About</a></li><li><a href="#">Blog</a></li><li><a href="#">Contact</a></li></ul>
          </div>
          <div className="footer-col">
            <h4>Legal</h4>
            <ul><li><a href="#">Privacy</a></li><li><a href="#">Terms</a></li><li><a href="#">Cookies</a></li></ul>
          </div>
        </div>
        <div className="footer-bottom">
          <span>© 2026 Sponsr. All rights reserved.</span>
          <span>Built as a PM portfolio project</span>

// ── APP ───────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [companyId, setCompanyId] = useState(null);
  const [searchQ, setSearchQ] = useState('');

  const navigate = useCallback((p, id=null, q='') => {
    setPage(p);
    if (id) setCompanyId(id);
    if (q) setSearchQ(q);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const showFooter = !['signin'].includes(page);

  return (
    <>
      <Navbar page={page} onNavigate={navigate} />
      {page === 'home'    && <Landing onNavigate={navigate} />}
      {page === 'search'  && <Search  onNavigate={navigate} initialQ={searchQ} />}
      {page === 'profile' && <CompanyProfile companyId={companyId} onNavigate={navigate} />}
      {page === 'alerts'  && <Alerts  onNavigate={navigate} />}
      {page === 'signin'  && <SignIn  onNavigate={navigate} />}
      {showFooter && <Footer onNavigate={navigate} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
